<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Forge Scraper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #f97316, #ea580c);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header span { font-size: 10px; opacity: 0.85; }
    .pro-badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 700;
      margin-left: auto;
    }
    .body { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 11px;
    }
    .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .status.disconnected .dot { background: #ef4444; }
    .platform-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .detected {
      padding: 10px 14px;
      background: #1a1d27;
      border-radius: 8px;
      border: 1px solid #2d3140;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detected-icon { font-size: 20px; }
    .detected-name { font-weight: 600; font-size: 12px; }
    .detected-url { font-size: 10px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3); }
    .btn-secondary {
      background: #1a1d27;
      color: #e2e8f0;
      border: 1px solid #2d3140;
    }
    .btn-secondary:hover { border-color: #f97316; }
    .btn-claw {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      color: #fff;
    }
    .btn-breakdown {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
    }
    .btn-breakdown:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
    .btn-breakdown:disabled { opacity: 0.5; pointer-events: none; }
    .breakdown-result {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      font-size: 10px;
      color: #c4b5fd;
      display: none;
    }
    .breakdown-result.visible { display: block; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat {
      padding: 10px;
      background: #1a1d27;
      border-radius: 8px;
      text-align: center;
    }
    .stat-val { font-size: 18px; font-weight: 700; color: #f97316; }
    .stat-label { font-size: 9px; color: #94a3b8; margin-top: 2px; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2d3140;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #64748b;
    }
    .footer a { color: #f97316; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 18px;">🔥</span>
    <div>
      <h1>Content Forge Scraper</h1>
      <span>by ManTech Designs</span>
    </div>
    <span class="pro-badge">PRO</span>
  </div>

  <div class="body">
    <!-- Connection Status -->
    <div id="status" class="status">
      <div class="dot"></div>
      <span>Connected to Content Forge</span>
    </div>

    <!-- Detected Platform -->
    <div class="platform-label">Detected Platform</div>
    <div class="detected">
      <span class="detected-icon" id="platformIcon">🌐</span>
      <div>
        <div class="detected-name" id="platformName">No platform detected</div>
        <div class="detected-url" id="platformUrl">Navigate to a social platform</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="scrapeBtn">
        🕷️ Scrape This Page
      </button>
      <button class="btn btn-breakdown" id="breakdownBtn" disabled>
        🔬 Deep Breakdown
      </button>
      <button class="btn btn-secondary" id="scrapeProfile">
        👤 Scrape Full Profile
      </button>
      <button class="btn btn-claw" id="sendToClaw">
        🦀 Send to OpenClaw
      </button>
    </div>
    <div class="breakdown-result" id="breakdownResult"></div>

    <!-- Stats -->
    <div class="platform-label">Session Stats</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="postsScraped">0</div>
        <div class="stat-label">Posts Scraped</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="profilesScraped">0</div>
        <div class="stat-label">Profiles Analyzed</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>v1.0.0</span>
    <a href="http://localhost:3001/settings" target="_blank">⚙️ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
